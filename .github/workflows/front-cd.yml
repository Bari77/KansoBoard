name: CD - Frontend (Docker)

on:
  push:
    tags:
      - 'release/*'
      - 'staging/*'
  workflow_dispatch:

run-name: "Frontend #${{ github.run_number }}"

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    - name: Extract version from CHANGELOG.md
      id: version
      run: |
        VERSION=$(grep -E '^# \[v[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1 | sed -E 's/# \[v(.+)\].*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/staging/') || startsWith(github.ref, 'refs/tags/release/')
    needs: detect-version
    uses: ./.github/workflows/docker-wf.yml
    with:
        directory: "Frontend"
        app_env: ${{ startsWith(github.ref, 'refs/tags/staging/') && 'staging' || 'prod' }}
        tag: ${{ startsWith(github.ref, 'refs/tags/staging/') && 'staging' || 'latest' }}
        image_name: "kansoboard/front"
        version: ${{ needs.detect-version.outputs.version }}
        run_number: ${{ github.run_number }}
    secrets: inherit