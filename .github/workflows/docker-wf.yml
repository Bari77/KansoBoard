name: Docker CD

on:
    workflow_call:
        inputs:
            directory:
                required: true
                type: string
            app_env:
                required: true
                type: string
            tag:
                required: true
                type: string
            image_name:
                required: true
                type: string
            version:
                required: true
                type: string
            run_number:
                required: false
                type: string
                default: ""

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set registry host
              run: |
                  echo "REGISTRY_HOST=${REGISTRY%%/*}" >> $GITHUB_ENV
              env:
                  REGISTRY: ${{ vars.REGISTRY }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY_HOST }}
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build versioned image
              run: |
                  docker build \
                    -f ${{ inputs.directory }}/Dockerfile \
                    -t ${{ vars.REGISTRY }}/${{ inputs.image_name }}:${{ inputs.version }} \
                    --build-arg APP_ENV=${{ inputs.app_env }} \
                    --build-arg VERSION=${{ inputs.version }} \
                    --build-arg RUN_NUMBER=${{ inputs.run_number }} \
                    .

            - name: Push ${{ inputs.image_name }}:${{ inputs.version }}
              run: |
                  docker push ${{ vars.REGISTRY }}/${{ inputs.image_name }}:${{ inputs.version }}

            - name: Tag ${{ inputs.tag }}
              run: |
                  docker tag ${{ vars.REGISTRY }}/${{ inputs.image_name }}:${{ inputs.version }} \
                               ${{ vars.REGISTRY }}/${{ inputs.image_name }}:${{ inputs.tag }}

            - name: Push ${{ inputs.image_name }}:${{ inputs.version }}:${{ inputs.tag }}
              run: |
                  docker push ${{ vars.REGISTRY }}/${{ inputs.image_name }}:${{ inputs.tag }}

            - name: Build summary
              run: |
                  echo "### 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
                  echo "- **Environment :** ${{ inputs.app_env }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Module :** ${{ inputs.directory }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Image Docker :** ${{ vars.REGISTRY }}/${{ inputs.image_name }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Version :** \`${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- **Branche :** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- **Commit :** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- **Run number :** \`${{ inputs.run_number }}\`" >> $GITHUB_STEP_SUMMARY
