name: CD - Backend (Docker)

on:
  push:
    tags:
      - 'release/*'
      - 'staging/*'
  workflow_dispatch:

run-name: "Backend #${{ github.run_number }}"

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    - name: Extract version from CHANGELOG.md
      id: version
      run: |
        VERSION=$(grep -E '^# \[v[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1 | sed -E 's/# \[v(.+)\].*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

  publish:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    needs: detect-version
    uses: ./.github/workflows/docker-wf.yml
    with:
        directory: "Backend"
        app_env: ${{ github.ref == 'refs/heads/develop' && 'Staging' || 'Production' }}
        tag: ${{ github.ref == 'refs/heads/develop' && 'staging' || 'latest' }}
        image_name: "kansoboard/api"
        version: ${{ needs.detect-version.outputs.version }}
        run_number: ${{ github.run_number }}
    secrets: inherit